[gateway]
host = "0.0.0.0"
port = 42617
require_pairing = false
allow_public_bind = true

[autonomy]
level = "full"
allowed_commands = []
forbidden_paths = [
  "/etc",
  "/root",
  "/home",
  "/usr",
  "/bin",
  "/sbin",
  "/lib",
  "/opt",
  "/boot",
  "/dev",
  "/proc",
  "/sys",
  "/var",
  "/tmp",
  "~/.ssh",
  "~/.gnupg",
  "~/.aws",
  "~/.config",
  "/zeroclaw-data/.zeroclaw"
]

[agent]
max_tool_iterations = 50

[mcp]
enabled = true
deferred_loading = false

[[mcp.servers]]
name = "playwright"
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--executable-path", "/usr/bin/chromium", "--user-data-dir", "/zeroclaw-data/.browser-data"]
