services:
  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile.zeroclaw
    env_file:
      - .env
    environment:
      - ZEROCLAW_PROVIDER=${ZEROCLAW_PROVIDER}
      - ZEROCLAW_API_KEY=${ZEROCLAW_API_KEY}
      - ZEROCLAW_MODEL=${ZEROCLAW_MODEL}
    volumes:
      - ${ZEROCLAW_CONFIG_PATH}:/zeroclaw-data
    networks:
      - kerenhr-net

  kerenhr:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - zeroclaw
    networks:
      - kerenhr-net

networks:
  kerenhr-net:
    driver: bridge
