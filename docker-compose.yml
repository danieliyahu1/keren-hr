services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    env_file:
      - .env
    environment:
      - ZEROCLAW_PROVIDER=opencode
      - ZEROCLAW_API_KEY=${OPENCODE_API_KEY}
    volumes:
      - ${ZEROCLAW_MOUNT_PATH}:/zeroclaw-data/.zeroclaw
    networks:
      - kerenhr-net

  kerenhr:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - zeroclaw
    networks:
      - kerenhr-net

networks:
  kerenhr-net:
    driver: bridge
