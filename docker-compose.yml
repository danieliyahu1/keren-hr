services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    env_file:
      - .env
    networks:
      - kerenhr-net

  kerenhr:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - OPENCODE_BASE_URL=http://opencode:4096
    depends_on:
      - opencode
    networks:
      - kerenhr-net

networks:
  kerenhr-net:
    driver: bridge
