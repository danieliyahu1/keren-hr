spring.application.name=kerenhr
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${APP_PROFILE:dev}
opencode.base-url=${OPENCODE_BASE_URL}
app.user-workspaces-root=${USER_WORKSPACES_ROOT}
app.opencode.autostart=${OPENCODE_AUTOSTART}
app.opencode.command=${OPENCODE_COMMAND:opencode}
app.opencode.args=${OPENCODE_ARGS:serve --hostname 127.0.0.1 --port 4096}
app.opencode.working-directory=${OPENCODE_WORKING_DIRECTORY:}
app.opencode.startup-timeout-seconds=${OPENCODE_STARTUP_TIMEOUT_SECONDS:30}
app.opencode.stop-on-shutdown=${OPENCODE_STOP_ON_SHUTDOWN:true}

app.auth.users[0].username=user1
app.auth.users[0].password=pass1
app.auth.users[0].roles=USER

app.auth.users[1].username=user2
app.auth.users[1].password=pass2
app.auth.users[1].roles=USER

app.auth.users[2].username=atalya
app.auth.users[2].password=atalya
app.auth.users[2].roles=USER

app.auth.jwt-secret=${APP_AUTH_JWT_SECRET}
app.auth.jwt-expiration-seconds=${APP_AUTH_JWT_EXPIRATION_SECONDS}
app.frontend.allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:8080}
