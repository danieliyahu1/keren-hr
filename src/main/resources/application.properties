spring.application.name=kerenhr
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${APP_PROFILE:dev}

app.zeroclaw.ws-url=${ZEROCLAW_WS_URL:}
app.zeroclaw.timeout-seconds=${ZEROCLAW_TIMEOUT_SECONDS:600}

app.opencode.base-url=${OPENCODE_BASE_URL:http://localhost:4096}
app.opencode.timeout-seconds=${OPENCODE_TIMEOUT_SECONDS:600}

app.frontend.allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:8080}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never